name: release

# Cut a release by pushing a tag, e.g.:
#   git tag v0.0.1 && git push origin v0.0.1
#
# This creates a GitHub Release with auto-generated notes and pins the Homebrew
# formula (url + sha256 + version) to the tag on the default branch, so
# `brew install` (without --HEAD) installs the tagged version.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version from the tag
        id: ver
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"

      - name: Compute the source tarball sha256
        id: sha
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl -fsSL "$url" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)" >>"$GITHUB_OUTPUT"

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Pin the Homebrew formula and Scoop manifest on the default branch
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -eu
          work="$(mktemp -d)"
          git clone --depth 1 --branch "$DEFAULT_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$work"
          cd "$work"

          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"

          # Dispatcher script: update the embedded VERSION variable.
          sed -i -E "s#^(VERSION=\")[^\"]*(\")#\1${VERSION}\2#" "bin/git-review"

          # Homebrew formula (Ruby): anchored single-line replacements.
          f="Formula/git-review-workflow.rb"
          sed -i -E "s#^(  version ).*#\1\"${VERSION}\"#" "$f"
          sed -i -E "s#^(  url ).*#\1\"${url}\"#" "$f"
          sed -i -E "s#^(  sha256 ).*#\1\"${SHA256}\"#" "$f"

          # Scoop manifest (JSON): rewrite with jq.
          m="bucket/git-review-workflow.json"
          jq --arg v "$VERSION" --arg url "$url" --arg hash "$SHA256" \
            --arg ed "git-review-workflow-${VERSION}" \
            '.version=$v | .url=$url | .hash=$hash | .extract_dir=$ed' \
            "$m" >"$m.tmp" && mv "$m.tmp" "$m"

          if git diff --quiet -- "bin/git-review" "$f" "$m"; then
            echo "packaging already pinned to ${GITHUB_REF_NAME}; nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -qm "Pin Homebrew formula and Scoop manifest to ${GITHUB_REF_NAME} [skip ci]" -- "bin/git-review" "$f" "$m"
          git push origin "HEAD:${DEFAULT_BRANCH}"
