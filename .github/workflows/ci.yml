name: ci

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Check bin scripts are executable
        run: |
          missing=$(git ls-files -s bin/ | awk '$1 != "100755" && $4 !~ /\/\.gitkeep$/ {print $4}')
          if [ -n "$missing" ]; then
            echo "These files in bin/ are missing the executable bit (100755):" >&2
            echo "$missing" >&2
            echo "Fix with: git update-index --chmod=+x <file>" >&2
            exit 1
          fi
      - name: Install shellcheck
        run: |
          case "$RUNNER_OS" in
            macOS) brew install shellcheck ;;
            Windows) choco install shellcheck --no-progress -y ;;
            *) sudo apt-get update && sudo apt-get install -y shellcheck ;;
          esac
      - name: shellcheck
        # find recorre bin/ (incl. bin/git-review-verbs/, fuera del glob bin/*) y
        # excluye .gitkeep; cubre el dispatcher y todos los verbos.
        run: shellcheck $(find bin -type f ! -name '.gitkeep') install.sh uninstall.sh web-install.sh web-uninstall.sh bump-version.sh

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          case "$RUNNER_OS" in
            macOS) brew install bats-core ;;
            Windows) npm install -g bats ;;
            *) sudo apt-get update && sudo apt-get install -y bats ;;
          esac
      - name: Run tests
        run: bats tests/
