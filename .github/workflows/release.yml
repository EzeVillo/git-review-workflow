name: release

# Cut a release by pushing a tag, e.g.:
#   git tag v0.0.1 && git push origin v0.0.1
#
# This creates a GitHub Release with auto-generated notes, pins the Homebrew
# formula (url + sha256 + version) to the tag on the default branch, so
# `brew install` (without --HEAD) installs the tagged version, and publishes the
# tagged version to the npm registry.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Gate the release on a green test suite: a tag must not ship if the code it
  # points at is broken. This mirrors ci.yml but runs against the tagged commit
  # so the gate and the artifact are guaranteed to be the same code.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bin scripts are executable
        run: |
          missing=$(git ls-files -s bin/ | awk '$1 != "100755" {print $4}')
          if [ -n "$missing" ]; then
            echo "These files in bin/ are missing the executable bit (100755):" >&2
            echo "$missing" >&2
            echo "Fix with: git update-index --chmod=+x <file>" >&2
            exit 1
          fi
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        # find recorre bin/ (incl. bin/git-review-verbs/, fuera del glob bin/*) y
        # excluye .gitkeep; cubre el dispatcher y todos los verbos.
        run: shellcheck $(find bin -type f ! -name '.gitkeep') install.sh uninstall.sh web-install.sh web-uninstall.sh bump-version.sh
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run tests
        run: bats tests/

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version from the tag
        id: ver
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"

      - name: Compute the source tarball sha256
        id: sha
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl -fsSL "$url" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)" >>"$GITHUB_OUTPUT"

      - name: Verify the tagged tarball carries the matching VERSION
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -eu
          # VERSION and bin/git-review ship inside the tarball, so they must be
          # bumped in the tagged commit. Fail loudly if the tag got ahead.
          shipped="$(tar -xzOf source.tar.gz --wildcards '*/VERSION' | tr -d '[:space:]')"
          if [ "$shipped" != "$VERSION" ]; then
            echo "tag is v${VERSION} but the tarball ships VERSION=${shipped}." >&2
            echo "Bump VERSION (and bin/git-review) in the commit you tag." >&2
            exit 1
          fi

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Pin the Homebrew formula on the default branch
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -eu
          work="$(mktemp -d)"
          git clone --depth 1 --branch "$DEFAULT_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$work"
          cd "$work"

          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"

          # NOTE: VERSION and bin/git-review ship *inside* the tarball, so they
          # are bumped in the commit that gets tagged — not here (this commit
          # lands after the tag and would not reach the artifact).

          # Portable in-place sed (GNU vs BSD/macOS `-i` differ): temp-file swap.
          sed_i() {
            _t="$(mktemp)"
            sed -E "$1" "$2" >"$_t" && mv "$_t" "$2"
          }

          # Homebrew formula (Ruby): anchored single-line replacements.
          f="Formula/git-review-workflow.rb"
          sed_i "s#^(  version ).*#\1\"${VERSION}\"#" "$f"
          sed_i "s#^(  url ).*#\1\"${url}\"#" "$f"
          sed_i "s#^(  sha256 ).*#\1\"${SHA256}\"#" "$f"

          if git diff --quiet -- "$f"; then
            echo "formula already pinned to ${GITHUB_REF_NAME}; nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -qm "Pin Homebrew formula to ${GITHUB_REF_NAME} [skip ci]" -- "$f"
          git push origin "HEAD:${DEFAULT_BRANCH}"

  # Publish the tagged commit to npm. package.json ships *inside* the tarball and
  # is bumped in the tagged commit (the version tests gate that in `verify`), so
  # checking out the tag and running `npm publish` ships the right version.
  # id-token: write lets npm attach a provenance attestation (publishConfig sets
  # provenance: true). Skips cleanly until the NPM_TOKEN secret is configured, so
  # a release before npm is set up does not fail.
  npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish
      - name: Note when npm publishing is not configured
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN secret not set; skipping npm publish." >&2
