name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install shellcheck
          else
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
      - name: shellcheck
        run: shellcheck bin/* install.sh uninstall.sh

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi
      - name: Run tests
        run: bats tests/
