name: ci

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          case "$RUNNER_OS" in
            macOS) brew install shellcheck ;;
            Windows) choco install shellcheck --no-progress -y ;;
            *) sudo apt-get update && sudo apt-get install -y shellcheck ;;
          esac
      - name: shellcheck
        run: shellcheck bin/* install.sh uninstall.sh

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          case "$RUNNER_OS" in
            macOS) brew install bats-core ;;
            Windows) npm install -g bats ;;
            *) sudo apt-get update && sudo apt-get install -y bats ;;
          esac
      - name: Run tests
        run: bats tests/
